<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>felixel play</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo"><img src="assets/icons/logo koplett.svg" alt="felixel play"></div>
  </div>

  <!-- Ambient Particles -->
  <div class="particles" id="particles"></div>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="navbar-logo"><img src="assets/icons/logo koplett.svg" alt="felixel play"></div>
    <div class="navbar-filters" id="filters">
      <button class="filter-btn active" data-filter="all">Alle</button>
      <button class="filter-btn" data-filter="Wii">Wii</button>
      <button class="filter-btn" data-filter="WiiU">Wii U</button>
      <button class="filter-btn" data-filter="Switch">Switch</button>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero" id="hero">
    <div class="hero-bg" id="heroBg1"></div>
    <div class="hero-bg" id="heroBg2" style="opacity: 0;"></div>
    <video id="heroVideo" class="hero-video" muted loop playsinline></video>
    <div class="hero-gradient"></div>
    <div class="hero-content" id="heroContent">
      <div class="hero-platform-badge" id="heroBadge"></div>
      <h1 class="hero-title" id="heroTitle"></h1>
      <div class="hero-actions">
        <button class="btn-play" id="heroPlayBtn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Spielen
        </button>
        <button class="btn-info" id="heroInfoBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
          </svg>
          Info
        </button>
      </div>
    </div>
  </section>

  <!-- Game Rows -->
  <div class="rows-container" id="rowsContainer"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Launch Transition -->
  <div class="launch-overlay" id="launchOverlay">
    <div class="launch-backdrop" id="launchBackdrop"></div>
    <div class="launch-scrim"></div>
    <div class="launch-content">
      <div class="launch-meta">
        <div class="launch-logo"><img src="assets/icons/logo koplett.svg" alt="felixel play"></div>
        <div class="launch-title" id="launchTitle">Spiel wird gestartet</div>
        <div class="launch-platform" id="launchPlatform"></div>
      </div>
      <div class="launch-card" id="launchCard">
        <img id="launchCover" class="launch-cover" alt="">
      </div>
      <div class="launch-status" id="launchStatus">Emulator wird vorbereitet</div>
      <div class="launch-bar">
        <div class="launch-bar-fill"></div>
      </div>
    </div>
  </div>

  <script src="node_modules/gsap/dist/gsap.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
