<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>felixel play</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">felixel <span>play</span></div>
  </div>

  <!-- Ambient Particles -->
  <div class="particles" id="particles"></div>

  <!-- Sidebar Navigation -->
  <aside class="app-sidebar" id="sidebar" aria-label="Hauptnavigation">
    <div class="sidebar-logo" aria-label="felixel play">
      <div class="sidebar-logo-mark">
        <img src="logo.svg" alt="" class="sidebar-logo-img">
      </div>
      <div class="sidebar-logo-text">felixel <span>play</span></div>
    </div>

    <label class="sidebar-search" for="sidebarSearch">
      <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
      </svg>
      <input id="sidebarSearch" type="search" placeholder="Spiele suchen" autocomplete="off">
    </label>

    <div class="sidebar-nav" id="filters">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Bibliothek</div>
        <button class="sidebar-item filter-btn active" data-filter="all" type="button">
          <span class="sidebar-indicator"></span>
          <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
          <span class="sidebar-label">Alle Spiele</span>
        </button>
        <button class="sidebar-item filter-btn" data-filter="recent" type="button">
          <span class="sidebar-indicator"></span>
          <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/><path d="M12 7v5l3 2"/>
          </svg>
          <span class="sidebar-label">Zuletzt gespielt</span>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">Systeme</div>
        <button class="sidebar-item filter-btn" data-filter="Switch" type="button">
          <span class="sidebar-indicator"></span>
          <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="4" y="3" width="16" height="18" rx="4"/><path d="M10 4v16"/><circle cx="7" cy="8" r="1"/><circle cx="17" cy="16" r="1"/><path d="M15 8h4"/><path d="M17 6v4"/>
          </svg>
          <span class="sidebar-label">Nintendo Switch</span>
        </button>
        <button class="sidebar-item filter-btn" data-filter="WiiU" type="button">
          <span class="sidebar-indicator"></span>
          <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="5" width="18" height="12" rx="3"/><path d="M8 20h8"/><path d="M12 17v3"/><circle cx="8" cy="11" r="1"/><path d="M16 10h2"/><path d="M17 9v2"/>
          </svg>
          <span class="sidebar-label">Wii U</span>
        </button>
        <button class="sidebar-item filter-btn" data-filter="Wii" type="button">
          <span class="sidebar-indicator"></span>
          <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="8" y="3" width="8" height="18" rx="3"/><circle cx="12" cy="7" r="1"/><path d="M10 12h4"/><path d="M12 10v4"/>
          </svg>
          <span class="sidebar-label">Wii</span>
        </button>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="sidebar-item sidebar-action" data-action="emulator-status" type="button">
        <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 21h8"/><path d="M12 17v4"/><rect x="4" y="3" width="16" height="14" rx="3"/><path d="M8 8h8"/><path d="M8 12h5"/>
        </svg>
        <span class="sidebar-label">Emulator Status</span>
      </button>
      <button class="sidebar-item sidebar-action" data-action="settings" type="button">
        <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 1 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1A2 2 0 1 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 .9-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 1 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.5.9h.1a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/>
        </svg>
        <span class="sidebar-label">Einstellungen</span>
      </button>
      <button class="sidebar-item sidebar-action sidebar-exit" data-action="quit" type="button">
        <svg class="sidebar-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/>
        </svg>
        <span class="sidebar-label">Beenden</span>
      </button>
    </div>
  </aside>

  <main class="content-shell" id="contentShell">
    <!-- Hero Section -->
    <section class="hero" id="hero">
      <div class="hero-bg" id="heroBg1"></div>
      <div class="hero-bg" id="heroBg2" style="opacity: 0;"></div>
      <video id="heroVideo" class="hero-video" muted loop playsinline></video>
      <div class="hero-gradient"></div>
      <div class="hero-content" id="heroContent">
        <div class="hero-platform-badge" id="heroBadge"></div>
        <h1 class="hero-title" id="heroTitle"></h1>
        <div class="hero-actions">
          <button class="btn-play" id="heroPlayBtn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            Spielen
          </button>
          <button class="btn-info" id="heroInfoBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
            Info
          </button>
        </div>
      </div>
    </section>

    <!-- Game Rows -->
    <div class="rows-container" id="rowsContainer"></div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Launch Transition -->
  <div class="launch-overlay" id="launchOverlay">
    <div class="launch-backdrop" id="launchBackdrop"></div>
    <div class="launch-scrim"></div>
    <div class="launch-content">
      <div class="launch-meta">
        <div class="launch-logo">felixel <span>play</span></div>
        <div class="launch-title" id="launchTitle">Spiel wird gestartet</div>
        <div class="launch-platform" id="launchPlatform"></div>
      </div>
      <div class="launch-card" id="launchCard">
        <img id="launchCover" class="launch-cover" alt="">
      </div>
      <div class="launch-status" id="launchStatus">Emulator wird vorbereitet</div>
      <div class="launch-bar">
        <div class="launch-bar-fill"></div>
      </div>
    </div>
  </div>

  <script src="node_modules/gsap/dist/gsap.min.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
